name: Template validation — rml-template-srv

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Este é um template de estrutura — não compila diretamente.
# O CI apenas valida que os arquivos obrigatórios existem.
# Quando usado como base para um serviço real, o CI do novo repo fará o build.
jobs:

  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar arquivos obrigatórios do template
        run: |
          echo "Validando estrutura do template..."
          test -f pom.xml             && echo "OK pom.xml"
          test -f Dockerfile          && echo "OK Dockerfile"
          test -f k8s/deployment.yaml && echo "OK k8s/deployment.yaml"
          test -f k8s/service.yaml    && echo "OK k8s/service.yaml"
          test -f k8s/configmap.yaml  && echo "OK k8s/configmap.yaml"
          test -f src/main/resources/application.yml && echo "OK application.yml"
          echo "Template structure OK"
