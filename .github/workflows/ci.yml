name: CI/CD — rml-srv-SERVICE_NAME

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  IMAGE: ghcr.io/org-rml/rml-srv-br.com.SERVICE_NAME

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings (GitHub Packages)
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.PACKAGES_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Build e testes
        run: mvn --batch-mode dependency:go-offline clean verify

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Login no GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrai metadata da imagem
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GITHUB_ACTOR=${{ github.actor }}
          secrets: |
            packages_token=${{ secrets.PACKAGES_TOKEN }}

  deploy-sandbox:
    needs: docker
    runs-on: ubuntu-latest
    environment: sandbox
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v5
        with:
          repository: org-rml/rml-srv-SERVICE_NAME-config
          ref: sandbox
          token: ${{ secrets.CONFIG_REPO_TOKEN }}

      - name: Bump values-version.yaml — SANDBOX (DEV)
        run: |
          TAG=${{ needs.docker.outputs.image_tag }}
          sed -i "s|tag:.*|tag: \"${TAG}\"|" values-version.yaml
          git config user.email "ci@org-rml.com"
          git config user.name "CI Bot"
          git commit -am "ci(sandbox): bump image to ${TAG}"
          git push

  deploy-staging:
    needs: deploy-sandbox
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v5
        with:
          repository: org-rml/rml-srv-SERVICE_NAME-config
          ref: staging
          token: ${{ secrets.CONFIG_REPO_TOKEN }}

      - name: Bump values-version.yaml — STAGING (HOM)
        run: |
          TAG=${{ needs.docker.outputs.image_tag }}
          sed -i "s|tag:.*|tag: \"${TAG}\"|" values-version.yaml
          git config user.email "ci@org-rml.com"
          git config user.name "CI Bot"
          git commit -am "ci(staging): bump image to ${TAG}"
          git push

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
        with:
          repository: org-rml/rml-srv-SERVICE_NAME-config
          ref: production
          token: ${{ secrets.CONFIG_REPO_TOKEN }}

      - name: Bump values-version.yaml — PRODUCTION (PRD)
        run: |
          TAG=${{ needs.docker.outputs.image_tag }}
          sed -i "s|tag:.*|tag: \"${TAG}\"|" values-version.yaml
          git config user.email "ci@org-rml.com"
          git config user.name "CI Bot"
          git commit -am "ci(production): bump image to ${TAG}"
          git push
